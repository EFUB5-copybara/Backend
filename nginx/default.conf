server {
    listen 443 ssl;
    server_name api.copybara.o-r.kr;

    ssl_certificate /etc/letsencrypt/live/api.copybara.o-r.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.copybara.o-r.kr/privkey.pem;

    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;


        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' "$cors_origin" always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        if ($http_origin ~* ^(http://localhost:5173|https://your-frontend-domain)$) {
            add_header 'Access-Control-Allow-Origin' "$http_origin" always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
        }


    }
}

# HTTP → HTTPS 리디렉션
server {
    listen 80;
    server_name api.copybara.o-r.kr;

    return 301 https://$host$request_uri;
}
