spring:
  application:
    name: crumble

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost # Redis 서버 IP 또는 호스트명 (기본값)
      port: 6379      # Redis 서버 포트 (기본값)
      # password: your_redis_password # Redis에 비밀번호가 설정되어 있다면 여기에 입력
      database: 0 # 사용할 Redis 데이터베이스 번호 (기본 0)

jwt:
  secret: ZXhhbXBsZV9hX3NlY3JldF9rZXlfdGhhdF9pcyBhdF9sZWFzdF8zMl9jaGFyYWN0ZXJzX2xvbmc=
  access-token-expiration-millis: 3600000 # 1시간 (60분 * 60초 * 1000밀리초)
  refresh-token-expiration-millis: 604800000 # 7일 (7일 * 24시간 * 60분 * 60초 * 1000밀리초)

cors:
  allow-origins:
    - http://localhost:3000
    - http://localhost:5173