spring:
  application:
    name: crumble

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jwt:
    secret: ${JWT_KEY}
    access-token-expiration-millis: 3600000 # 1시간
    refresh-token-expiration-millis: 604800000 # 7일

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      database: 1

cors:
  allow-origins:
    - http://localhost:3000
    - http://localhost:5173

openai:
  api-key: ${API_KEY}